heading: "About <em>Ebony</em>"
paragraph1: "I study how people process language, and I use that expertise to design better language data, evaluation frameworks, and human-centered language technologies."
paragraph2: "I bring together psycholinguistics, behavioral research, and language analysis to understand how people interpret and respond to language in real-world contexts. My work connects experimental research with applied questions in speech, language, and human-centered technology."
