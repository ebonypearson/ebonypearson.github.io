  - id: memory-language-processing
    published: true
    order: 3
    category: cognition
    title: How can experimental data reveal how people interpret language in real time?
    organization: ""
    tags:
      - Eye Tracking
      - Quantitative Analysis
      - Experimental Design

    link: https://www.vanderbilt.edu/psychological_sciences/bio/ebony-pearson
    summary: This project used eye tracking, survey data, and large-scale behavioral experiments to examine how people process and interpret language in real time. I designed study protocols, managed participant-based data collection, and analyzed large behavioral datasets to identify patterns in human responses through quantitative modeling.
    source_ref: content/_projects/cognition/03-memory-language.md
