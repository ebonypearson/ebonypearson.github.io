    title: How can language data and evaluation methods improve AI systems?
    organization: ""
    tags:
      - Speech Corpora
      - Annotation Design
      - Evaluation Workflows

    link: ""
    summary: This project focused on how speech data quality, labeling decisions, and evaluation methods shape AI system performance. At SRI’s Speech Technology and Research Lab, I worked on speech data curation, labeling design, and error analysis to help identify where system issues were driven by data, annotation, or signal-processing differences and to support more reliable evaluation workflows.
