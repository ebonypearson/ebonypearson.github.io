<section class="experience-section research-areas" id="research-areas">
  <div class="themes-header">
    <h2 class="big-left">Research <em>Areas</em></h2>
    <div class="big-right-wrap"></div>
  </div>

  <div class="themes-list">
    {% for theme in site.data.themes %}
    <article class="theme-item research-item editorial-item{% if forloop.first %} open{% endif %}">
      <span class="theme-num">{{ theme.num }}</span>
      <div class="theme-content">
        <h3 class="research-title">
          <button class="research-toggle" type="button" aria-expanded="{% if forloop.first %}true{% else %}false{% endif %}" aria-controls="research-panel-{{ forloop.index }}">
            <span>{{ theme.title }}</span>
            <span class="research-icon" aria-hidden="true">+</span>
          </button>
        </h3>
        <div class="research-panel" id="research-panel-{{ forloop.index }}">
          <p class="editorial-subhead">{{ theme.subhead }}</p>
          <p class="editorial-org">{{ theme.org }}</p>
          <p>{{ theme.description }}</p>
          <div class="editorial-chips">
            {% for keyword in theme.keywords %}
            <span>{{ keyword }}</span>
            {% endfor %}
          </div>
          <p class="editorial-impact">{{ theme.impact }}</p>
        </div>
      </div>
    </article>
    {% endfor %}
  </div>
</section>
